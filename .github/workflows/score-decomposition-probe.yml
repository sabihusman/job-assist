name: Score decomposition probe

# Read-only (Phase A1): GETs /admin/diagnostics/score-decomposition — over open
# postings, the score_components reconciliation counts (reconciled / mismatched /
# scored-without-components) and a few sample decompositions. Pure GET; no writes.
#
# Required secrets: API_URL, API_AUTH_TOKEN.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    name: Score decomposition reconciliation
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
    steps:
      - name: Verify API is up
        run: curl -fsS --max-time 10 "$API_URL/health"

      - name: Fetch + print
        run: |
          echo "-- GET /admin/diagnostics/score-decomposition --"
          RESP=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "Authorization: Bearer ${API_AUTH_TOKEN}" \
            "${API_URL}/admin/diagnostics/score-decomposition" || printf '\n000')
          CODE=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "-- HTTP ${CODE} --"
          if [ "$CODE" != "200" ]; then
            echo "::error::diagnostic returned HTTP ${CODE}"
            echo "$BODY"
            exit 1
          fi
          echo
          echo "=== counts (reconciled / mismatched / missing) ==="
          echo "$BODY" | jq '.counts'
          echo
          echo "=== sample decompositions ==="
          echo "$BODY" | jq '.samples'
