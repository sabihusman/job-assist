name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# On PRs: cancel in-flight runs when a new commit is pushed.
# On main: never cancel — a deploy may be listening for the green signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege defaults. Jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Web (Next.js · TypeScript)
  # ---------------------------------------------------------------------------

  web-lint:
    name: Web · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint

  web-typecheck:
    name: Web · Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck

  web-test:
    name: Web · Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web test

  web-e2e:
    # Runs only on PRs (not on push to main — E2E was already verified on the
    # originating PR). Skips Dependabot PRs, which get no Vercel preview deploy.
    #
    # Design: polls the GitHub Deployments API for a Vercel preview deployment
    # on the PR head SHA. Times out after 5 minutes and exits success with a
    # warning if no deployment appears — this is the expected behaviour before
    # the Vercel project is connected to the repo.
    name: Web · E2E (Vercel Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      deployments: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        # Polls the GitHub Deployments API via gh CLI + shell sleep.
        # gh CLI is pre-installed on ubuntu-latest; no sandbox concerns.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          MAX_WAIT=300   # 5 minutes
          POLL=15        # poll every 15 seconds
          elapsed=0

          echo "Polling for Vercel preview deployment on SHA $SHA …"

          while [ "$elapsed" -lt "$MAX_WAIT" ]; do
            DEPLOYMENTS=$(gh api "repos/$REPO/deployments?sha=$SHA&environment=Preview&per_page=10" 2>/dev/null || echo "[]")
            COUNT=$(echo "$DEPLOYMENTS" | jq '. | length')

            if [ "$COUNT" -gt "0" ]; then
              for ID in $(echo "$DEPLOYMENTS" | jq -r '.[].id'); do
                STATUSES=$(gh api "repos/$REPO/deployments/$ID/statuses?per_page=1" 2>/dev/null || echo "[]")
                STATE=$(echo "$STATUSES" | jq -r '.[0].state // empty')
                URL=$(echo "$STATUSES"   | jq -r '.[0].environment_url // empty')

                if [ "$STATE" = "success" ] && [ -n "$URL" ]; then
                  echo "Vercel preview ready: $URL"
                  echo "found=true"        >> "$GITHUB_OUTPUT"
                  echo "preview_url=$URL"  >> "$GITHUB_OUTPUT"
                  exit 0
                fi

                if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
                  echo "Vercel deployment failed (state: $STATE). Failing E2E step."
                  exit 1
                fi
              done
            fi

            echo "No ready deployment yet (${elapsed}s elapsed). Retrying in ${POLL}s …"
            sleep "$POLL"
            elapsed=$((elapsed + POLL))
          done

          # Timed out — Vercel not connected yet, or deploy is unusually slow.
          # Skip E2E gracefully rather than blocking the PR.
          echo "::warning::No Vercel preview deployment found within 5 minutes. Skipping E2E. Connect the Vercel project to the repo to enable preview-URL E2E."
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Run E2E against preview URL
        if: steps.vercel-preview.outputs.found == 'true'
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.preview_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        if: always() && steps.vercel-preview.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # API (Python · FastAPI)
  # ---------------------------------------------------------------------------

  api-lint:
    name: API · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  api-typecheck:
    name: API · Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run mypy src

  api-openapi-snapshot:
    # Asserts `apps/api/openapi.json` matches whatever FastAPI emits from
    # the current source. The frontend (PR #32a+) reads from this
    # snapshot to generate TypeScript types, so any backend schema
    # change must regenerate the snapshot in the same PR.
    name: API · OpenAPI Snapshot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Regenerate openapi.json
        run: |
          uv run python -c "import json, sys; sys.path.insert(0, 'src'); from job_assist.main import app; print(json.dumps(app.openapi(), indent=2))" > openapi.json.fresh
      - name: Assert no drift vs committed snapshot
        run: diff -u openapi.json openapi.json.fresh

  api-test:
    name: API · Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_assist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/job_assist_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest

  api-migration-check:
    # Verifies that Alembic migrations are syntactically valid and apply cleanly
    # against an ephemeral Postgres + pgvector database.
    #
    # Skips gracefully if no migrations exist yet (expected until Week 1 ships).
    # When migrations are added, ensure alembic.ini uses a sync DATABASE_URL
    # (postgresql:// via psycopg2, not postgresql+asyncpg://) for the migration
    # runner. The async URL in config.py is for the app runtime only.
    name: API · Migration Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_assist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen

      - name: Check for Alembic migrations
        id: check-migrations
        run: |
          if [ -f "alembic.ini" ] && [ -d "migrations/versions" ]; then
            COUNT=$(find migrations/versions -name "*.py" -not -name "__init__.py" | wc -l)
            if [ "$COUNT" -gt "0" ]; then
              echo "has_migrations=true" >> "$GITHUB_OUTPUT"
              echo "Found $COUNT migration(s) — running check."
            else
              echo "has_migrations=false" >> "$GITHUB_OUTPUT"
              echo "migrations/versions/ is empty — skipping migration check (expected until Week 1 ships)."
            fi
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "No alembic.ini found — skipping migration check (expected until Week 1 ships)."
          fi

      - name: Verify migration SQL syntax
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: uv run alembic upgrade head --sql > /dev/null
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_assist_test

      - name: Apply migrations to ephemeral DB
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_assist_test

      - name: Smoke-test downgrade
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: uv run alembic downgrade base
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_assist_test

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required by TruffleHog diff scan
      - name: TruffleHog — scan for verified credentials
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # Eval (placeholder — active Week 4+)
  # ---------------------------------------------------------------------------

  outreach-eval:
    # Placeholder for the outreach tailoring eval harness, which ships in
    # Week 4 when the Claude-based tailoring agent is built. At that point
    # this job runs 10 reference (prompt → output) pairs through the agent
    # and asserts precision/recall against manually verified expectations.
    #
    # It is intentionally kept in the all-checks dependency list now so the
    # gate job requires no editing when the real harness replaces this stub.
    name: Outreach Eval (placeholder — active Week 4)
    runs-on: ubuntu-latest
    steps:
      - name: Eval not yet implemented
        run: |
          echo "Outreach eval harness not yet implemented."
          echo "This job becomes the real eval in Week 4 when the outreach tailoring agent ships."
          echo "It will run 10 reference (prompt, expected_output) pairs through the agent"
          echo "and report precision/recall against manually verified ground truth."

  # ---------------------------------------------------------------------------
  # PR comment — results summary
  # ---------------------------------------------------------------------------

  pr-comment:
    # Posts (or updates) a results table on the PR. Runs after all jobs,
    # even on failure, so the comment reflects the final state of the run.
    # Only fires on pull_request events — no comment on push to main.
    name: PR · Results Summary
    runs-on: ubuntu-latest
    needs:
      - web-lint
      - web-typecheck
      - web-test
      - web-e2e
      - api-lint
      - api-typecheck
      - api-openapi-snapshot
      - api-test
      - api-migration-check
      - secret-scan
      - outreach-eval
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Web · Lint':             '${{ needs.web-lint.result }}',
              'Web · Typecheck':        '${{ needs.web-typecheck.result }}',
              'Web · Unit Tests':       '${{ needs.web-test.result }}',
              'Web · E2E':              '${{ needs.web-e2e.result }}',
              'API · Lint':             '${{ needs.api-lint.result }}',
              'API · Typecheck':        '${{ needs.api-typecheck.result }}',
              'API · OpenAPI Snapshot': '${{ needs.api-openapi-snapshot.result }}',
              'API · Unit Tests':       '${{ needs.api-test.result }}',
              'API · Migration Check':  '${{ needs.api-migration-check.result }}',
              'Secret Scan':            '${{ needs.secret-scan.result }}',
              'Outreach Eval':          '${{ needs.outreach-eval.result }}',
            };

            const icon = r => ({ success: '✅', failure: '❌', cancelled: '⏸️', skipped: '⏭️' }[r] ?? '❓');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const rows = Object.entries(results)
              .map(([name, result]) => `| ${icon(result)} | ${name} | \`${result}\` |`)
              .join('\n');

            const body = [
              '## CI Results',
              '',
              '| | Job | Result |',
              '|---|---|---|',
              rows,
              '',
              `[→ Full run logs](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.body.startsWith('## CI Results') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # Required gate — the single status check set in branch protection
  # ---------------------------------------------------------------------------

  all-checks:
    name: All Checks
    runs-on: ubuntu-latest
    needs:
      - web-lint
      - web-typecheck
      - web-test
      - web-e2e
      - api-lint
      - api-typecheck
      - api-openapi-snapshot
      - api-test
      - api-migration-check
      - secret-scan
      - outreach-eval
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed or were cancelled."
            exit 1
          fi
          echo "All checks passed."
