name: Deploy

# Runs on every merge to main. Order: wait for the API to come up healthy,
# then deploy web, then smoke checks. If any step fails, the workflow halts —
# no retry logic. Surface the failure clearly and fix forward.
#
# Migrations are NOT applied here anymore (feat/migration-deploy-gate). They run
# in the API's start command (apps/api/scripts/start.sh: `alembic upgrade head`
# then `exec uvicorn`), atomically with the code deploy and using Railway's
# runtime DATABASE_URL. This closed the #104/#107 hole where this side-channel
# migration step (a) raced Railway's independent webhook auto-deploy and
# (b) failed silently on a stale GitHub DATABASE_URL secret while Railway
# shipped the code anyway.
#
# Required secrets (set once in repo Settings → Secrets → Actions):
#   API_URL               — Railway production URL (e.g. https://job-assist-api.railway.app)
#   VERCEL_TOKEN          — Vercel personal access token
#   VERCEL_ORG_ID         — Vercel team/org ID (from vercel link or dashboard)
#   VERCEL_PROJECT_ID     — Vercel project ID (from vercel link or dashboard)
#   VERCEL_PRODUCTION_URL — Production web URL (e.g. https://job-assist.vercel.app)

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual retrigger from Actions tab or gh CLI

permissions:
  contents: read

concurrency:
  group: deploy-production
  # Never cancel a deploy mid-flight — partial deploys are worse than queued ones.
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      # -----------------------------------------------------------------------
      # Migrations: applied by the API start command, NOT here.
      # -----------------------------------------------------------------------
      # apps/api/scripts/start.sh runs `alembic upgrade head` then `exec uvicorn`
      # with `set -euo pipefail`, so a failed migration aborts container start
      # and the prior healthy deploy keeps serving. The Layer-2 startup schema
      # guard (job_assist.db.schema_guard, on in production) refuses to serve if
      # the live schema is ever behind the code head. See docs/VERIFICATION.md
      # rule 4. (No GitHub DATABASE_URL secret dependency — runtime env only.)

      # -----------------------------------------------------------------------
      # Wait for Railway's GitHub auto-deploy to come up healthy
      # -----------------------------------------------------------------------
      # -----------------------------------------------------------------------
      # Railway is connected to this repo with auto-deploy on push to main, so
      # the moment the merge commit lands Railway begins building. We do NOT
      # invoke `railway redeploy` here because it races with the webhook-driven
      # deploy and Railway rejects the second call ("cannot be redeployed —
      # currently building"). Instead we wait for the auto-deploy to expose
      # a healthy /health endpoint.
      #
      # Railway deploys typically take 90–180s (build + container start).
      # Polling at 10s intervals up to 300s (30 attempts) — generous enough
      # to absorb the additional build queue time on busy days.
      #
      # If you ever need to fall back to an explicit GitHub-Actions-driven
      # deploy, disable Auto Deploy on the Railway api service first, then
      # restore an `railway redeploy --service api --yes` step here.
      - name: Wait for API health check
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          MAX_ATTEMPTS=30
          INTERVAL=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy after $((i * INTERVAL))s."
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — /health returned HTTP $STATUS. Retrying in ${INTERVAL}s …"
            sleep "$INTERVAL"
          done

          echo "API did not become healthy within $((MAX_ATTEMPTS * INTERVAL))s. Halting deploy."
          exit 1

      # -----------------------------------------------------------------------
      # Step 4 — Build and deploy web to Vercel
      # -----------------------------------------------------------------------
      # Uses the three-step Vercel CLI production deploy pattern:
      #   vercel pull  → downloads env vars and project config
      #   vercel build → builds the Next.js app locally (reproducible)
      #   vercel deploy --prebuilt → uploads the pre-built output
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment and config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build web app for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy web to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # -----------------------------------------------------------------------
      # Step 5 — Production smoke checks
      # -----------------------------------------------------------------------
      # A hard fail here means something is up in production. Investigate
      # immediately — the Railway and Vercel dashboards are the first stop.
      - name: Smoke check — API
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Production API health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "API smoke check passed (HTTP $STATUS)."

      - name: Smoke check — web
        env:
          VERCEL_PRODUCTION_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${VERCEL_PRODUCTION_URL}")
          if [ "$STATUS" != "200" ]; then
            echo "Production web smoke check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Web smoke check passed (HTTP $STATUS)."
